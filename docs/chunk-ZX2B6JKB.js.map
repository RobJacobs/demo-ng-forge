<div class="body">
  <form class="form" novalidate autocomplete="off" [formGroup]="formGroup">
    <formly-form [form]="formGroup" [model]="model()" [fields]="formDefinition()" [options]="formOptions"></formly-form>
  </form>
  <pre style="font-size: 12px"> {{ formGroup.getRawValue() | json }} </pre>
  <!-- <pre style="font-size: 12px"> {{ model() | json }} </pre> -->
</div>

<forge-toolbar class="footer" inverted> </forge-toolbar>
